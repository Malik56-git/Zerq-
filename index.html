<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZERQ | Private Collection</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/JWCSmD6P/zer-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --luxury-black: #1a1a1a;
            --luxury-gold: #c5a059;
            --bg-cream: #faf9f6;
            --white: #ffffff;
            --border: #e5e5e5;
            --text-muted: #666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-cream);
            color: var(--luxury-black); 
            line-height: 1.6;
        }

        /* Typography */
        h1, h2, .card-title {
            font-family: 'Bodoni Moda', serif;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Header Navigation */
        header { 
            background: var(--white);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo-img {
            width: 60px;
            filter: grayscale(1);
            margin-bottom: 15px;
        }

        header h1 { font-size: 2.2rem; margin-bottom: 5px; }
        header p { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            color: var(--luxury-gold);
        }

        /* Minimalist Filter */
        .filter-container { 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            padding: 40px 20px;
        }
        
        .filter-btn { 
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer; 
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding-bottom: 5px;
            transition: 0.3s;
            border-bottom: 1px solid transparent;
        }
        
        .filter-btn.active { 
            color: var(--luxury-black);
            border-bottom: 1px solid var(--luxury-black);
        }

        /* Product Grid */
        .container { max-width: 1300px; margin: auto; padding: 0 20px 100px; }
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 40px; 
        }

        .card { 
            background: none;
            overflow: hidden; 
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        
        .card:hover { transform: translateY(-5px); }
        
        .img-container {
            background: #f0f0f0;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .card img { 
            width: 100%; 
            aspect-ratio: 3/4; 
            object-fit: cover; 
            display: block;
            filter: saturate(0.9);
            transition: 0.6s;
        }

        .card:hover img { transform: scale(1.05); }

        .card-body { text-align: left; padding: 10px 0; }
        .card-title { font-size: 1.1rem; margin-bottom: 5px; color: var(--luxury-black); }
        .card-price { font-size: 0.9rem; color: var(--text-muted); font-weight: 300; margin-bottom: 15px; }
        
        .add-btn { 
            background: var(--luxury-black);
            color: var(--white); 
            border: none; 
            padding: 12px; 
            width: 100%;
            cursor: pointer; 
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
        }
        
        .add-btn:hover { background: var(--luxury-gold); }

        /* Floating Elements */
        .cart-icon { 
            position: fixed; bottom: 40px; right: 40px; 
            background: var(--luxury-black); color: white; 
            width: 60px; height: 60px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .cart-badge { 
            position: absolute; top: 12px; right: 12px; 
            background: var(--luxury-gold); color: white; 
            width: 18px; height: 18px; border-radius: 50%; 
            font-size: 0.6rem; display: flex; align-items: center; justify-content: center; 
        }

        /* Modal */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); 
            display: none; z-index: 2000; justify-content: flex-end; 
        }
        .modal-content { 
            background: var(--white); width: 100%; max-width: 400px; height: 100%;
            padding: 40px; position: relative; animation: slideIn 0.5s ease;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        input, textarea { 
            width: 100%; border: none; border-bottom: 1px solid var(--border); 
            padding: 15px 0; margin-bottom: 20px; font-family: inherit; outline: none;
        }
        input:focus { border-bottom-color: var(--luxury-gold); }

        .submit-order { 
            background: var(--luxury-black); color: white; padding: 20px; 
            border: none; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            .product-grid { grid-template-columns: 1fr 1fr; gap: 15px; }
            .filter-container { gap: 15px; }
        }
    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/JWCSmD6P/zer-logo.png" alt="ZERQ" class="logo-img">
    <h1>ZERQ</h1>
    <p>The Art of Footwear</p>
</header>

<div class="filter-container">
    <button class="filter-btn active" onclick="filterProducts('All', this)">Collection</button>
    <button class="filter-btn" onclick="filterProducts('Women Shoes', this)">Shoes</button>
    <button class="filter-btn" onclick="filterProducts('Women Stylish', this)">Boutique</button>
</div>

<main class="container">
    <div id="product-grid" class="product-grid"></div>
</main>

<div class="cart-icon" onclick="openCart()">
    <span class="cart-badge" id="cart-count">0</span>
    <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M8 1a2.5 2.5 0 0 1 2.5 2.5V4h-5v-.5A2.5 2.5 0 0 1 8 1zm3.5 3v-.5a3.5 3.5 0 1 0-7 0V4H1v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4h-3.5z"/></svg>
</div>

<div class="modal" id="cart-modal">
    <div class="modal-content">
        <span onclick="closeCart()" style="cursor:pointer; float:right">CLOSE</span>
        <h2 style="margin: 40px 0 20px;">Your Bag</h2>
        <div id="cart-items"></div>
        <div style="margin: 30px 0; text-align: right; border-top: 1px solid #eee; padding-top: 20px;">
            <p style="color: #888; font-size: 0.8rem;">TOTAL ESTIMATE</p>
            <strong style="font-size: 1.4rem;">PKR <span id="cart-total">0</span></strong>
        </div>
        
        <form id="checkout-form" action="https://formspree.io/f/myknbdnj" method="POST">
            <input type="text" name="name" placeholder="FULL NAME" required>
            <input type="tel" name="phone" placeholder="WHATSAPP NUMBER" required>
            <textarea name="address" placeholder="SHIPPING ADDRESS" rows="2" required></textarea>
            <input type="hidden" name="Order_Details" id="order-summary-input">
            <button type="submit" class="submit-order">Complete Order</button>
        </form>
    </div>
</div>

<script>
    const products = [
        { id: 1, name: "Mustard Rexine Flats", price: 1200, cat: "Women Stylish", img: "https://i.ibb.co/Mym7h4HD/mustard.jpg" },
        { id: 2, name: "Pink Beaded Flats", price: 999, cat: "Women Shoes", img: "https://i.ibb.co/0yddxfC8/pink.jpg" },
        { id: 3, name: "Silver Wedding Heels", price: 2500, cat: "Women Shoes", img: "https://i.ibb.co/fzSX4n3D/silver.jpg" },
        { id: 4, name: "Classic Black Pumps", price: 1800, cat: "Women Stylish", img: "https://i.ibb.co/TBTgv8TN/black.jpg" },
        { id: 5, name: "Golden Zari Khussa", price: 1500, cat: "Women Shoes", img: "https://i.ibb.co/zWFPDYSp/khussa.jpg" }
    ];

    let cart = JSON.parse(localStorage.getItem('zerq_cart')) || [];

    function renderProducts(filter = 'All') {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = '';
        const items = filter === 'All' ? products : products.filter(p => p.cat === filter);
        items.forEach(p => {
            grid.innerHTML += `
                <div class="card">
                    <div class="img-container"><img src="${p.img}" alt="${p.name}" loading="lazy"></div>
                    <div class="card-body">
                        <div class="card-title">${p.name}</div>
                        <div class="card-price">PKR ${p.price}</div>
                        <button class="add-btn" onclick="addToCart(${p.id})">Add to Bag</button>
                    </div>
                </div>`;
        });
    }

    function filterProducts(cat, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderProducts(cat);
    }

    function addToCart(id) {
        const p = products.find(x => x.id === id);
        const exists = cart.find(x => x.id === id);
        if(exists) exists.qty++; else cart.push({...p, qty: 1});
        updateCart();
    }

    function updateCart() {
        localStorage.setItem('zerq_cart', JSON.stringify(cart));
        document.getElementById('cart-count').innerText = cart.reduce((a,b) => a + b.qty, 0);
        renderCart();
    }

    function renderCart() {
        const container = document.getElementById('cart-items');
        let total = 0; let summary = "";
        container.innerHTML = '';
        cart.forEach((item, i) => {
            total += item.price * item.qty;
            summary += `${item.name} x${item.qty} (PKR ${item.price*item.qty})\n`;
            container.innerHTML += `
                <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
                    <img src="${item.img}" style="width:50px; height:65px; object-fit:cover;">
                    <div style="flex-grow:1">
                        <div style="font-size:0.8rem; text-transform:uppercase;">${item.name}</div>
                        <div style="font-size:0.7rem; color:#888;">${item.qty} x PKR ${item.price}</div>
                    </div>
                    <button onclick="changeQty(${i},-1)" style="background:none; border:none; cursor:pointer;">-</button>
                    <span>${item.qty}</span>
                    <button onclick="changeQty(${i},1)" style="background:none; border:none; cursor:pointer;">+</button>
                </div>`;
        });
        document.getElementById('cart-total').innerText = total;
        document.getElementById('order-summary-input').value = summary + "Total: PKR " + total;
    }

    function changeQty(index, d) {
        cart[index].qty += d;
        if(cart[index].qty <= 0) cart.splice(index, 1);
        updateCart();
    }

    function openCart() { document.getElementById('cart-modal').style.display='flex'; }
    function closeCart() { document.getElementById('cart-modal').style.display='none'; }

    renderProducts();
    updateCart();
</script>

</body>
</html>
